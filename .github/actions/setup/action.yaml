name: stak/setup
description: Sets up a build environment for Stak Scheme
inputs: {}
outputs: {}
runs:
  using: composite
  steps:
    - uses: raviqqe/cargo-cache@4c7db86c0f73cc94a5608ad8b09e7a8e136fd259 # v1.0.4
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: stable
    - uses: homebrew/actions/setup-homebrew@50b8c2ab4a835c38897ed2c56c293b07167c0b59 # main
      with:
        stable: true
    - run: tools/ci/setup.sh
      shell: bash
