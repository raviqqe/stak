name: release
on:
  push:
    branches:
      - main
  pull_request:
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
jobs:
  cargo:
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth
        if: github.ref == 'refs/heads/main'
      - run: tools/ci/release.sh ${{ github.ref != 'refs/heads/main' && '--dry-run' || '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
  wasm:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - uses: ./.github/actions/setup-node
      - run: tools/wasm_build.sh
      - uses: raviqqe/pnpm-publish@861df6deae4193d882d368966a23f188e2252004 # v1.0.1
        with:
          directory: wasm/pkg
          release: ${{ github.ref == 'refs/heads/main' }}
  goreleaser:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: brew install zig
      - run: cargo install --locked cargo-zigbuild
      - id: version
        run: echo version=v$(cargo run --bin stak -- --version | grep -o '[0-9.]*') > ${{ github.output }}
      - uses: raviqqe/goreleaser-action@2ec1f4c6dd2c754f5f9c7779e8de095c0cf64e62 # v1.0.2
        with:
          version: ${{ steps.version.outputs.version }}
          snapshot: ${{ github.ref != 'refs/heads/main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker:
    needs:
      - cargo
      - goreleaser
    strategy:
      fail-fast: false
      matrix:
        image:
          - binary: stak
          - binary: stak-compile
          - binary: stak-decode
          - binary: stak-interpret
          - binary: stak-profile
          - binary: stak-repl
          - binary: mstak
            directory: cmd/minimal
          - binary: mstak-interpret
            directory: cmd/minimal
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'release' || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
        if: ${{ github.ref == 'refs/heads/main' }}
      - id: metadata
        run: |
          (
            echo repository=${{ vars.DOCKER_USER || 'test' }}/${{ matrix.image.binary }}
            echo version=$(git tag --points-at | sed s/^v//)
          ) >> ${{ github.output }}
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          build-args: |
            BINARY=${{ matrix.image.binary }}
            DIRECTORY=${{ matrix.image.directory || '.' }}
          platforms: |
            linux/amd64
            ${{ github.ref == 'refs/heads/main' && 'linux/arm64/v8' || '' }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ steps.metadata.outputs.repository }}:latest
            ${{ steps.metadata.outputs.version && format('{0}:{1}', steps.metadata.outputs.repository, steps.metadata.outputs.version) || '' }}
      # spell-checker: disable-next-line
      - uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}
          repository: ${{ steps.metadata.outputs.repository }}
          short-description: The miniature, embeddable R7RS Scheme implementation
        if: github.ref == 'refs/heads/main'
  release:
    needs:
      - cargo
      - docker
      - goreleaser
      - wasm
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: for result in ${{ join(needs.*.result, ' ') }}; do [ $result = success ]; done
