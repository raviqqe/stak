[package]
name = "mstak-interpret"
version.workspace = true
edition.workspace = true
description = "Minimal Stak Scheme bytecode interpreter"
readme.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
dlmalloc = { version = "0.2.14", features = ["global"] }
origin = {
  version = "0.26.2",
  default-features = false,
  features = [
    "libc",
  ]
}
stak-device = {
  path = "../../device",
  version = "0.12.14",
  features = ["libc"]
}
stak-file = { path = "../../file", version = "0.12.14", features = ["libc"] }
stak-libc = { path = "../../libc", version = "0.12.14" }
stak-process-context = {
  path = "../../process-context",
  version = "0.12.14",
  features = [
    "libc",
  ]
}
stak-r7rs = { path = "../../r7rs", version = "0.12.14" }
stak-time = { path = "../../time", version = "0.12.14", features = ["libc"] }
stak-vm = { path = "../../vm", version = "0.12.14" }

[lints]
workspace = true
