[package]
name = "stak-build"
version.workspace = true
edition.workspace = true
description = "Build scripts for Stak Scheme"
readme.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
glob = "0.3.3"
stak-compiler = { path = "../compiler", version = "0.12.19" }
tokio = {
  version = "1.52.3",
  features = [
    "fs",
    "io-util",
    "process",
    "rt-multi-thread",
  ]
}
which = "8.0.3"

[features]
async = ["stak-compiler/async"]

[lints]
workspace = true
